      ### Training Stability
      DGPO maintains stable learning curves well beyond where other methods collapse. As shown below, while GRPO and standard PPO
      struggle with the 0.5B model, DGPO sustains performance gains up to 1000 training steps.

      <div class="uk-text-center uk-margin-medium-top">
        <img src="acl_26_curve_v2.jpg" alt="Training Stability Curve" style="width: 70%; height: auto;" />
        <p class="uk-text-meta uk-margin-small-top">Figure 5: Training stability comparison. DGPO (red) maintains stable improvement while baselines collapse.</p>
      </div>
