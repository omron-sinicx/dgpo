description: >
  We investigate whether compact language models (0.5–1B) can acquire sophisticated agentic
  retrieval-augmented generation (RAG) behavior. While existing agentic RAG systems rely on
  multi-billion-parameter models, compact models suffer from poor initial outputs, sparse rewards,
  and unstable reinforcement learning dynamics. To address these challenges, we propose
  Distillation-Guided Policy Optimization (DGPO), a two-phase training framework combining
  cold-start knowledge distillation and selective teacher-guided reinforcement learning.

