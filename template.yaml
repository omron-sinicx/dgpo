overview: |
  This project introduces **Distillation-Guided Policy Optimization (DGPO)**, a reinforcement
  learning framework designed to unlock agentic retrieval-augmented generation (RAG) capabilities
  in compact language models (0.5–1B parameters). DGPO stabilizes training via:

  1. **Cold-Start Initialization with Knowledge Distillation (KD)** using high-quality
     teacher-generated trajectories.
  2. **Selective Teacher Guidance** during RL—rewarding correct autonomous reasoning while
     penalizing incorrect outputs via KL divergence against the teacher.

  DGPO achieves up to **55× improvement** over base compact models and even surpasses its
  3B-parameter teacher on several datasets.

body:
  - title: Challenges in Compact Agentic RAG
    text: |
      Applying Reinforcement Learning (RL) to compact models presents unique challenges. Unlike larger models,
      compact models (e.g., 0.5B parameters) exhibit poor initial performance, resulting in sparse rewards
      and unstable training dynamics.

      As shown in the figures below, smaller models lag significantly behind larger counterparts in agentic RAG tasks,
      and standard RL methods like PPO and GRPO often fail to improve performance or lead to early collapse.

      <div class="uk-grid-small uk-child-width-1-2@m uk-text-center" uk-grid>
          <div>
              <img src="acl26_scaling.jpg" alt="Performance Gap across model sizes" style="max-width: 100%; height: auto;" />
              <p class="uk-text-meta uk-margin-small-top">Figure 1: Comparison of prompt-based and RL-based agentic RAG performance gaps.</p>
          </div>
          <div>
              <img src="acl26_limitation.jpg" alt="Training instability in small models" style="max-width: 100%; height: auto;" />
              <p class="uk-text-meta uk-margin-small-top">Figure 2: Unstable training curves of 0.5B models using PPO and GRPO.</p>
          </div>
      </div>


  - title: Distillation-Guided Policy Optimization (DGPO)
    text: |

      <div class="uk-text-center uk-margin-medium-top uk-margin-medium-bottom">
        <img src="acl26_fig2_v3.png" alt="DGPO Framework Diagram" style="max-width: 100%; height: auto; border: none;" />
        <p class="uk-text-meta uk-margin-small-top">Figure 3: The DGPO pipeline transforms the reference model from a passive regularizer into an active pedagogical guide.</p>
      </div>

      To overcome these challenges, we propose **Distillation-Guided Policy Optimization (DGPO)**.
      Our framework operates in two key phases:

      1.  **Cold-Start KD Initialization:** The student model is initialized by distilling from a teacher's correct
          trajectories (TGOs). This establishes a stable foundation for reasoning.
      2.  **Distillation-Guided RL:** We employ a "mimic if wrong, reward if right" strategy.
          * **Correct Answer:** The student receives a reward (r=1) and updates its policy autonomously.
          * **Incorrect Answer:** The student is penalized via KL divergence to mimic the teacher's distribution,
              effectively using the teacher as an active guide for error correction.

      The core of DGPO lies in its selective reward and penalty mechanism during the RL phase:

      $$
      r(x, y) = \begin{cases}
      1 & \text{if } y = y^* \text{ (Reward for correct answer)} \\
      -\beta D_{KL}[\pi_g(\cdot|x) || \pi_\theta(\cdot|x)] & \text{if } y \neq y^* \text{ (Teacher mimicry if wrong)}
      \end{cases}
      $$

      This objective allows the student to explore when confident but forces alignment with the teacher $\pi_g$ when it fails.



  - title: Agentic RAG Capabilities (ARC) Evaluation
    text: |
      We introduce **Agentic RAG Capabilities (ARC)**, a fine-grained metric to diagnose *how* models perform agentic search,
      rather than just checking final answer accuracy. ARC evaluates three dimensions:

      * **Thinking:** The ability to plan search steps and synthesize evidence.
      * **Query Rewriting:** The ability to reformulate user questions into effective search queries.
      * **Source Referencing:** The ability to accurately cite and integrate retrieved documents.

      <div class="uk-text-center uk-margin-medium-top uk-margin-medium-bottom">
        <img src="neurips_ws_teaser_bottom.jpg" alt="Agentic RAG Capabilities" style="max-width: 100%; height: auto;" />
        <p class="uk-text-meta uk-margin-small-top">Figure 4: ARC characterizes thinking, query rewriting, and source referencing capabilities.</p>
      </div>



  - title: Experimental Results
    text: |
      ### Overall Performance
      We evaluated DGPO across seven benchmarks. DGPO consistently outperforms RL baselines (PPO) and distillation baselines.
      Remarkably, the 0.5B student model trained with DGPO approaches or even **surpasses the 3B teacher model** on datasets like NQ and HotpotQA.

